<!DOCTYPE html>
<html lang="{{ .Site.Language }}">

<head>
  <meta charset="utf-8">
  <title>{{ if not .IsHome }}{{ .Title | title }} | {{ end }}{{ .Site.Title }}</title>
  <link rel="canonical" href="{{ .Site.BaseURL }}">
  <link rel='stylesheet' type='text/css' href='{{ .Site.BaseURL }}style.css'>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
</head>

<body>
  <header>
    <nav class="top-nav">
      <a class="nav-btn hp" href="{{ .Site.BaseURL }}" title="Home">
        <svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512">
          <path d="M80 212v236a16 16 0 0016 16h96V328a24 24 0 0124-24h80a24 24 0 0124 24v136h96a16 16 0 0016-16V212"
            fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" />
          <path d="M480 256L266.89 52c-5-5.28-16.69-5.34-21.78 0L32 256M400 179V64h-48v69" fill="none"
            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" />
        </svg>
        <span>Home</span>
      </a>
      <a class="nav-btn github" href="https://github.com/unamatasanatarai/ksiazka-z-przepisami" title="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512">
          <path d="M256 32a224 224 0 00-70.68 436.5c11.2 2 15.3-4.87 15.3-10.79s-.05-19.12-.05-37.52c-62.31 13.54-75.46-30-75.46-30-10.19-25.88-24.87-32.77-24.87-32.77-20.34-13.9.15-13.63.15-13.63 22.48 1.58 34.3 23.08 34.3 23.08 20 34.25 52.41 24.35 65.17 18.63 2-14.48 7.79-24.35 14.17-29.93-49.75-5.65-102-24.87-102-110.7 0-24.46 8.73-44.45 23.08-60.11-2.31-5.67-10-28.45 2.19-59.27 0 0 18.82-6 61.64 23a214 214 0 01116.1 0c42.79-29 61.58-23 61.58-23 12.19 30.82 4.53 53.6 2.22 59.27 14.38 15.66 23.05 35.65 23.05 60.11 0 86-52.35 105-102.2 110.5 8 6.94 15.22 20.66 15.22 41.64 0 30.07-.27 54.32-.27 61.7 0 5.97 4.05 12.91 15.4 10.71A224 224 0 00256 32z" fill="currentColor"/>
        </svg>
        <span>GitHub</span>
      </a>
    </nav>
    <h1>{{ block "title" . }}{{ end }}</h1>
  </header>

  <section>
    <article>
      {{ block "main" . }}{{ .Content }}{{ end }}
    </article>
  </section>

  <footer>
    <div class="footer-categories">
      {{ range .Site.Taxonomies.tags.ByCount }}
        <a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a>
      {{ end }}
    </div>
    <div class="footer-info">
      {{ if not .PublishDate.IsZero }}
        {{ .PublishDate.Format "02-01-2006" }} :
      {{ end }}
      {{ .Site.Title }} : <a href="{{ .Site.BaseURL }}">{{ .Site.BaseURL }}</a>
    </div>
  </footer>
</body>

</html>
